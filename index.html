<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#080808">
    <meta name="description" content="The House of Kalli — you've arrived.">
    <title>The House of Kalli</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <main class="front-door">
      <section class="portrait" aria-label="Portrait of Kalli">
        <div class="portrait-shade"></div>
      </section>

      <section class="welcome" aria-labelledby="house-title">
        <div class="welcome-inner">
          <p class="eyebrow">A PRIVATE HOUSE</p>
          <h1 id="house-title">THE HOUSE<br>OF KALLI</h1>
          <p class="arrival">You've arrived.</p>
          <a class="enter" href="#inside" aria-label="Step inside The House of Kalli">
            <span>STEP INSIDE</span>
            <span class="arrow" aria-hidden="true">→</span>
          </a>
        </div>
        <p class="location">SYDNEY · AUSTRALIA</p>
      </section>
    </main>

    <section id="inside" class="inside" aria-labelledby="inside-title">
      <p class="eyebrow">THE HOUSE OF KALLI</p>
      <h2 id="inside-title">Welcome.</h2>
      <p>The next room is being prepared.</p>
      <a href="#house-title">Return to the front door</a>
    </section>
  </body>
</html>
