<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#080808">
    <meta name="robots" content="noindex, nofollow">
    <title>Vault Orders · The House of Kalli</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body class="vault-admin-page">
    <main class="vault-admin">
      <p class="eyebrow">PRIVATE OFFICE</p>
      <h1>Vault Orders</h1>
      <form class="admin-login" id="admin-login">
        <label>
          <span>Admin password</span>
          <input type="password" name="admin_password" autocomplete="current-password" required>
        </label>
        <button type="submit">OPEN ORDERS →</button>
        <p class="form-status" id="admin-status" hidden></p>
      </form>
      <section class="vault-link-manager" id="vault-link-manager" hidden>
        <div class="vault-link-manager-heading">
          <p class="eyebrow">CURRENT CUSTOMER COLLECTION LINKS</p>
          <h2>Rotating delivery links</h2>
          <p>Replace a link here whenever you disable and regenerate it in Dropbox. Every authorised order room will immediately use the current link.</p>
        </div>
        <form id="vault-links-form"></form>
      </section>
      <section class="admin-orders" id="admin-orders" hidden aria-live="polite"></section>
    </main>
    <script src="js/vault-admin.js" defer></script>
  </body>
</html>
